<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="24" height="24">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#cfe3f2"/>
      <stop offset="100%" stop-color="#dceef8"/>
    </linearGradient>
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="55%"  stop-color="#eaf5ff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#c8e4f8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="pencilBody" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#2980b9"/>
      <stop offset="100%" stop-color="#3498db"/>
    </linearGradient>
    <linearGradient id="pencilTop" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#1a6fa8"/>
      <stop offset="100%" stop-color="#2e86c1"/>
    </linearGradient>
  </defs>

  <!-- Background rounded rect -->
  <rect x="4" y="4" width="120" height="120" rx="26" ry="26" fill="url(#bgGrad)"/>

  <!-- Crosshair lines -->
  <g stroke="#6bbedd" stroke-width="2" stroke-linecap="round">
    <!-- top -->
    <line x1="64" y1="10" x2="64" y2="28"/>
    <line x1="58" y1="10" x2="70" y2="10"/>
    <!-- bottom -->
    <line x1="64" y1="100" x2="64" y2="118"/>
    <line x1="58" y1="118" x2="70" y2="118"/>
    <!-- left -->
    <line x1="10" y1="64" x2="28" y2="64"/>
    <line x1="10" y1="58" x2="10" y2="70"/>
    <!-- right -->
    <line x1="100" y1="64" x2="118" y2="64"/>
    <line x1="118" y1="58" x2="118" y2="70"/>
  </g>

  <!-- Glow circle -->
  <circle cx="64" cy="64" r="38" fill="url(#glowGrad)"/>

  <!-- Pencil (rotated -45deg around center 64,64) -->
  <g transform="translate(64,64) rotate(-45)">
    <!-- Eraser cap -->
    <rect x="-11" y="-32" width="22" height="10" rx="3" fill="url(#pencilTop)"/>
    <!-- Eraser separator -->
    <line x1="-11" y1="-22" x2="11" y2="-22" stroke="#1a6090" stroke-width="1.2"/>
    <!-- Body -->
    <rect x="-11" y="-22" width="22" height="34" fill="url(#pencilBody)"/>
    <!-- Highlight -->
    <rect x="-7" y="-20" width="5" height="30" rx="2" fill="#7dd4f4" opacity="0.35"/>
    <!-- Tip separator -->
    <line x1="-11" y1="12" x2="11" y2="12" stroke="#1a6090" stroke-width="1.2"/>
    <!-- Tip triangle -->
    <polygon points="-11,12 11,12 0,28" fill="#1f6fa6"/>
    <!-- Tip highlight -->
    <polygon points="-11,12 0,12 0,28" fill="#2980b9" opacity="0.5"/>
  </g>
</svg>
